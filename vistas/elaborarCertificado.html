<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elaborar Certificado de Calibracion</title>
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>

    <header class="topbar">
        <div class="brand">
            <div class="brand-title">INGROUP S.R.L.</div>
            <div class="brand-subtitle">INGENIERÍA ELECTROMECÁNICA</div>
        </div>
  <!--      <div class="actions">
            <button id="btnReset" class="btn btn-ghost" type="button">Limpiar</button>
            <button id="btnExportJSON" class="btn" type="button">Exportar JSON</button>
            <button id="btnPreview" class="btn btn-primary" type="button">Vista previa (luego PDF)</button>
        </div>-->
    </header>

    <main class="container">
    <h1 class="title"> Verificación de Calibración de Torquímetro</h1>

    <!-- DATOS GENERALES -->
    <section class="card">
      <h2>Datos del instrumento a verificar</h2>

      <div class="grid">
        <label>
          <span>Marca</span>
          <input id="marca" type="text" />
        </label>

        <label>
          <span>Codigo</span>
          <input id="codigo" type="text" />
        </label>

        <label>
          <span>Rango torque (mín)</span>
          <input id="rangoMin" type="number" />
        </label>

        <label>
          <span>Rango torque (máx)</span>
          <input id="rangoMax" type="number" />
        </label>

        <label>
          <span>Nro. Serie</span>
          <input id="serie" type="text" />
        </label>

        <label>
          <span>Tolerancia (± %)</span>
          <input id="tolerancia" type="number" value="4" />
        </label>

        <label class="wide">
          <span>Cliente</span>
          <input id="cliente" type="text" />
        </label>
      </div>
    </section>

    <!-- CONDICIONES -->
    <section class="card">
      <h2>Condiciones y referencia</h2>

      <div class="grid">
        <label>
          <span>Fecha</span>
          <input id="fecha" type="date"/>
        </label>

        <label>
          <span>Temp. Ambiente (°C)</span>
          <input id="tempC" type="number" step="0.1" value="30" />
        </label>

        <label>
          <span>Humedad (%)</span>
          <input id="humedad" type="number" step="1" value="40" />
        </label>

        <label class="wide">
          <span>Instrumento padron</span>
          <input id="padron" type="text"/>
        </label>

        <label class="wide">
          <span>Realizado por</span>
          <input id="tecnico" type="text"/>
        </label>
      </div>
    </section>

    <!-- PUNTOS -->
    <section class="card">
      <div class="row-between">
        <h2>Valores tomados</h2>

        <table id="miTabla">
          <thead>
            <tr>
              <th>Rep</th>
              <th id="head1"><input type="text" placeholder="Nominal 1"></th>
              <th id="head2"><input type="text" placeholder="Nominal 2"></th>
              <th id="head3"><input type="text" placeholder="Nominal 3"></th>
            </tr>
          </thead>

        <tbody>
          <tr>
            <th>1</th>
              <td><input></td><td><input></td><td><input></td>
          </tr>
          <tr>
            <th>2</th>
              <td><input></td><td><input></td><td><input></td>
          </tr>
          <tr>
            <th>3</th>
              <td><input></td><td><input></td><td><input></td>
          </tr>
          <tr>
            <th>4</th>
              <td><input></td><td><input></td><td><input></td>
          </tr>
          <tr>
            <th>5</th>
              <td><input></td><td><input></td><td><input></td>
          </tr>
        </tbody>
        </table>

       <label>Firma del Tecnico</label>

       <div class='firma-wrap'>
        <canvas id="firmaCanvas"></canvas>
       </div>

       <div class="firma-actions">
          <button id="btnLimpiarFirma" type="button">Limpiar</button>
           
       </div>

       <input type="hidden" id="firmaBase64" />

       
    <button id="btnResultados" class="btn" type="button">Resultados</button>

    <div id="salidaResultados"></div>

    <button id="btnGuardar" class="btn" type="button" style="display: none;">
        Guardar certificado
    </button>

    <button id="btnPdf" class="btn" type="button" style="display:none;">
        Generar PDF
    </button>




      
  </section>

    <footer class="footnote">
      <small>Diseñado por @freeSoft</small>
    </footer>
  </main>

  
 
  
  <script src="../js/config.js"></script>
  <script src = "../js/index.js"></script>
  
  <script src= "../js/cal.js"></script>
    
</body>
</html>
